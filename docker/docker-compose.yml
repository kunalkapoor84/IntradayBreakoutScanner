version: "3.8"

services:
  scanner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: intraday-scanner
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Kolkata
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../reports:/app/reports
      - ../charts:/app/charts
      - ../output:/app/output
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  dashboard:
    image: python:3.11-slim
    container_name: scanner-dashboard
    restart: unless-stopped
    command: >
      sh -c "pip install -q fastapi uvicorn && 
             uvicorn app.dashboard.app:app --host 0.0.0.0 --port 8080"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Kolkata
    volumes:
      - ..:/app
      - ../data:/app/data
      - ../logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      - scanner
    profiles:
      - dashboard
